services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=${PORT:-5000}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-local}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - SECRET_KEY=${SECRET_KEY:-default-dev-key}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - WEATHER_LOCATION=${WEATHER_LOCATION:-}
      - EINK_CLIENT_URL=http://client:8081
      - TZ=${TZ:-Europe/Berlin}
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    depends_on:
      client:
        condition: service_started
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - EINK_SERVER_URL=http://server:5000
      - EINK_REFRESH_INTERVAL=${EINK_REFRESH_INTERVAL:-300}
      - EINK_CLIENT_PORT=8081
      - EINK_LOG_LEVEL=${EINK_LOG_LEVEL:-INFO}
      - TZ=${TZ:-Europe/Berlin}
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/spidev0.1:/dev/spidev0.1
      - /dev/gpiomem:/dev/gpiomem
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip1:/dev/gpiochip1
      - /dev/gpiochip2:/dev/gpiochip2
    privileged: true
    restart: unless-stopped
